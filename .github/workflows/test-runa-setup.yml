name: Test Runa Setup

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Test Runa directory
        run: |
          echo "Testing Runa directory structure..."
          
          if [ -d "runa" ]; then
            echo "✅ runa/ directory found"
            ls -la runa/
          else
            echo "❌ runa/ directory not found"
            exit 1
          fi
          
          if [ -f "runa/runa.toml" ]; then
            echo "✅ runa.toml found"
          else
            echo "❌ runa.toml not found"
            exit 1
          fi
          
          if [ -d "runa/src" ]; then
            echo "✅ src/ directory found"
            ls -la runa/src/
          else
            echo "❌ src/ directory not found"
            exit 1
          fi
          
          echo "�� All tests passed!" 