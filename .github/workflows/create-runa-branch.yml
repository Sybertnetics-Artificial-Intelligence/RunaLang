name: Create Runa-Only Branch

on:
  push:
    branches: [main]
    paths: ['runa/**']
  workflow_dispatch:

jobs:
  create-runa-branch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Create Runa-only branch
        run: |
          echo "Creating Runa-only branch..."
          
          # Create a new branch with only Runa files
          git checkout --orphan runa-only
          
          # Remove all files
          git rm -rf .
          
          # Copy only the Runa project files
          cp -r runa/* .
          
          # Add all files to the new branch
          git add .
          
          # Commit the changes
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Create Runa-only branch with project files"
          
          echo "✅ Runa-only branch created"
          
      - name: Push Runa-only branch
        run: |
          echo "Pushing Runa-only branch..."
          git push origin runa-only --force
          echo "✅ Runa-only branch pushed"
          
      - name: Create deployment summary
        run: |
          echo "📋 Runa Project Deployment Summary"
          echo "=================================="
          echo "✅ Created runa-only branch"
          echo "✅ Pushed to GitHub"
          echo ""
          echo "📁 Files included:"
          ls -la | grep -E "(src|tests|docs|examples|runa\.toml|README\.md)"
          echo ""
          echo "🔗 Next steps:"
          echo "1. Go to your GitHub repository settings"
          echo "2. Set the default branch to 'runa-only'"
          echo "3. Enable GitHub Pages from the 'runa-only' branch"
          echo "4. Your repository will now show only the Runa project" 