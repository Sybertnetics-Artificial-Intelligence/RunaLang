name: Deploy Runa Project

on:
  push:
    branches: [main]
    paths: ['runa/**']
  pull_request:
    branches: [main]
    paths: ['runa/**']
  workflow_dispatch:

jobs:
  deploy-runa:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Runa environment
        run: |
          echo "Setting up Runa project environment..."
          cd runa
          
      - name: Validate Runa structure
        run: |
          echo "Validating Runa project structure..."
          cd runa
          
          # Check that key directories exist
          if [ ! -d "src" ]; then
            echo "❌ Error: src/ directory not found"
            exit 1
          fi
          
          if [ ! -d "src/compiler" ]; then
            echo "❌ Error: src/compiler/ directory not found"
            exit 1
          fi
          
          if [ ! -d "src/modules" ]; then
            echo "❌ Error: src/modules/ directory not found"
            exit 1
          fi
          
          if [ ! -d "src/runtime" ]; then
            echo "❌ Error: src/runtime/ directory not found"
            exit 1
          fi
          
          if [ ! -f "runa.toml" ]; then
            echo "❌ Error: runa.toml not found"
            exit 1
          fi
          
          echo "✅ Runa project structure validated"
          
      - name: Test Rust components
        run: |
          echo "Testing Rust runtime components..."
          cd runa/src/runtime
          
          # Check if Cargo.toml exists
          if [ -f "Cargo.toml" ]; then
            echo "Building Rust runtime..."
            cargo check --verbose
            echo "✅ Rust components validated"
          else
            echo "⚠️  No Rust components found, skipping"
          fi
          
      - name: Validate Runa source files
        run: |
          echo "Validating Runa source files..."
          cd runa
          
          # Count .runa files
          runa_files=$(find . -name "*.runa" | wc -l)
          echo "Found $runa_files .runa files"
          
          if [ $runa_files -eq 0 ]; then
            echo "⚠️  Warning: No .runa files found"
          else
            echo "✅ Runa source files found"
          fi
          
      - name: Create deployment artifact
        run: |
          echo "Creating deployment artifact..."
          cd runa
          
          # Create a clean deployment directory
          mkdir -p ../runa-deploy
          
          # Copy only the Runa project files
          cp -r src ../runa-deploy/
          cp -r tests ../runa-deploy/
          cp -r docs ../runa-deploy/
          cp -r examples ../runa-deploy/
          cp -r ide-plugins ../runa-deploy/
          cp -r dev-tools ../runa-deploy/
          cp -r docker ../runa-deploy/
          cp runa.toml ../runa-deploy/
          cp README.md ../runa-deploy/
          cp requirements.txt ../runa-deploy/
          cp docker-compose.yml ../runa-deploy/
          cp Dockerfile ../runa-deploy/
          cp Makefile ../runa-deploy/
          cp .gitignore ../runa-deploy/
          
          echo "✅ Deployment artifact created"
          
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: runa-project
          path: runa-deploy/
          retention-days: 30
          
      - name: Deploy to GitHub Pages (if main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying Runa project to GitHub Pages..."
          cd runa
          
          # This would deploy the runa/ directory contents
          # You can customize this based on your deployment needs
          echo "✅ Runa project ready for deployment"
          
      - name: Summary
        run: |
          echo "🎉 Runa project deployment completed!"
          echo "📁 Project structure:"
          cd runa
          find . -type d -name "src" -o -name "tests" -o -name "docs" | head -10
          echo "📄 Key files:"
          ls -la runa.toml README.md 2>/dev/null || echo "Files not found in current directory" 