name: Deploy Runa to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['runa/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Runa project
        run: |
          echo "Setting up Runa project for deployment..."
          cd runa
          
      - name: Validate project structure
        run: |
          echo "Validating Runa project structure..."
          cd runa
          
          # Essential directories
          required_dirs=("src" "tests" "docs")
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Error: $dir/ directory not found"
              exit 1
            fi
          done
          
          # Essential files
          required_files=("runa.toml" "README.md")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Error: $file not found"
              exit 1
            fi
          done
          
          echo "✅ Runa project structure validated"
          
      - name: Build documentation
        run: |
          echo "Building Runa documentation..."
          cd runa
          
          # Create a simple index page for GitHub Pages
          mkdir -p ../runa-pages
          
          # Copy documentation
          if [ -d "docs" ]; then
            cp -r docs/* ../runa-pages/
          fi
          
          # Create main index page
          cat > ../runa-pages/index.md << 'EOF'
          # Runa Programming Language
          
          Welcome to the Runa Programming Language repository!
          
          ## What is Runa?
          
          Runa is a natural language programming language with multi-language translation capabilities.
          
          ## Quick Start
          
          See the [Getting Started Guide](user/guides/GETTING_STARTED.md) for installation and usage instructions.
          
          ## Documentation
          
          - [Language Specification](user/language-specification/)
          - [Standard Library](user/libraries/)
          - [API Reference](api/)
          
          ## Examples
          
          Check out the [examples directory](../examples/) for sample Runa code.
          
          ## Contributing
          
          See [CONTRIBUTING.md](../CONTRIBUTING.md) for development guidelines.
          EOF
          
          echo "✅ Documentation built"
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: runa-pages/
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 