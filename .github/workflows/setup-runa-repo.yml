name: Setup Runa Repository

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['runa/**']

permissions:
  contents: write

jobs:
  setup-runa:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create Runa-only branch
        run: |
          echo "Setting up Runa-only branch..."
          
          # Check if runa directory exists
          if [ ! -d "runa" ]; then
            echo "❌ Error: runa/ directory not found"
            exit 1
          fi
          
          # Create or reset the runa-only branch
          git checkout --orphan runa-only || git checkout runa-only
          
          # Remove all existing files
          git rm -rf . || true
          
          # Copy Runa project files
          echo "Copying Runa project files..."
          cp -r runa/* .
          
          # Add all files
          git add .
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Commit changes
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "Update Runa project files [skip ci]"
          fi
          
          echo "✅ Runa-only branch prepared"
          
      - name: Push Runa-only branch
        run: |
          echo "Pushing runa-only branch..."
          git push origin runa-only --force
          echo "✅ Runa-only branch pushed successfully"
          
      - name: Create summary
        run: |
          echo "🎉 Runa repository setup completed!"
          echo ""
          echo "📋 What was done:"
          echo "✅ Created/updated runa-only branch"
          echo "✅ Copied all Runa project files"
          echo "✅ Pushed to GitHub"
          echo ""
          echo "🔗 Next steps:"
          echo "1. Go to your GitHub repository"
          echo "2. Click on 'Settings' tab"
          echo "3. Scroll down to 'Default branch' section"
          echo "4. Change default branch to 'runa-only'"
          echo "5. Click 'Update' to confirm"
          echo ""
          echo "Your repository will now display only the Runa project!" 