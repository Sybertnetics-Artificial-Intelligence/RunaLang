[tox]
minversion = 4.0
envlist = py311, py312, lint, type, docs
isolated_build = True

[gh-actions]
python =
    3.11: py311, lint, type, docs
    3.12: py312

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
commands =
    pytest {posargs:tests} --cov=runa --cov-report=xml --cov-report=term

[testenv:lint]
deps =
    black>=23.0.0
    flake8>=6.0.0
    flake8-docstrings>=1.6.0
    flake8-import-order>=0.18.2
commands =
    black --check src tests
    flake8 src tests

[testenv:type]
deps =
    mypy>=1.0.0
    types-setuptools
commands =
    mypy src

[testenv:docs]
deps =
    sphinx>=6.0.0
    sphinx-rtd-theme>=1.0.0
    sphinx-autodoc-typehints>=1.20.0
commands =
    sphinx-build -W -b html docs/source docs/_build/html

[flake8]
max-line-length = 100
exclude =
    .tox,
    .git,
    __pycache__,
    build,
    dist,
    *.pyc,
    *.egg-info,
    .cache,
    .eggs
ignore = E203, W503
per-file-ignores =
    __init__.py: F401
    tests/*: D101, D102, D103
import-order-style = google
application-import-names = runa

[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --cov=runa --cov-report=term

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

[mypy.plugins.numpy.*]
ignore_missing_imports = True 