[project]
name = "runa-lang"
version = "0.3.0"
description = "Runa: Natural Language Programming Language with Multi-Language Translation"
readme = "README.md"
license = "MIT"
authors = [
    {name = "Sybertnetics", email = "info@sybertnetics.com"}
]
maintainers = [
    {name = "Sybertnetics", email = "info@sybertnetics.com"}
]
keywords = [
    "programming-language", 
    "natural-language", 
    "compiler", 
    "transpiler", 
    "ast", 
    "code-generation",
    "multi-language"
]

[project.urls]
"Homepage" = "https://github.com/sybertnetics/runa"
"Documentation" = "https://runa-lang.readthedocs.io"
"Repository" = "https://github.com/sybertnetics/runa"
"Bug Tracker" = "https://github.com/sybertnetics/runa/issues"

[project.scripts]
runa = "runa.tools.cli:main"
runa-lsp = "runa.tools.lsp.lsp_server:main"
runa-package = "runa.tools.package.manager:main"

[build]
source-dir = "src"
output-dir = "target"
targets = ["python", "javascript", "webassembly", "llvm"]

[compiler]
lexer = "src/compiler/lexer"
parser = "src/compiler/parser"
ir = "src/compiler/ir"
driver = "src/compiler/driver.runa"

[modules]
stdlib = "src/modules/stdlib"
ai = "src/modules/ai"
advanced = "src/modules/advanced"
core = "src/modules/core"

[runtime]
rust-project = "src/runtime"
cargo-toml = "src/runtime/Cargo.toml"

[testing]
test-dir = "tests"
unit-tests = "tests/unit"
integration-tests = "tests/integration"
verification-tests = "tests/verification"

[documentation]
docs-dir = "docs"
user-guides = "docs/user"
api-docs = "docs/api"

[development]
ide-plugins = "ide-plugins"
examples = "examples"
dev-tools = "dev-tools"

[formatting]
line-length = 100
indent-style = "spaces"
indent-size = 4

[linting]
strict-mode = true
warn-unused = true
warn-unreachable = true 