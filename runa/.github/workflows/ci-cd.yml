name: Runa CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt || true

      - name: Run all tests
        run: |
          python -m pytest --maxfail=1 --disable-warnings -v

      - name: Performance validation (<100ms compilation)
        run: |
          python scripts/validate_performance_integration.py

      - name: Build Runa CLI artifact
        run: |
          tar -czf runa-cli-artifact.tar.gz .

      - name: Upload Runa CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: runa-cli-artifact
          path: runa-cli-artifact.tar.gz 