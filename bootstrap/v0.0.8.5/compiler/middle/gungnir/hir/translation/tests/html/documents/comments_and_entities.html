<!DOCTYPE html>
<html>
<body>
  <!-- This is a comment -->
  <h1>HTML Entities &amp; Comments</h1>

  <!-- Multiple line comment
       spanning several lines
       with important notes -->

  <p>Use &lt;br&gt; for line breaks</p>
  <p>Copyright: &copy;</p>
  <p>Non-breaking space:&nbsp;&nbsp;&nbsp;here</p>
  <p>Quote: &quot;Hello&quot;</p>
  <p>Ampersand: &amp;</p>

  <!-- End of document -->
</body>
</html>
