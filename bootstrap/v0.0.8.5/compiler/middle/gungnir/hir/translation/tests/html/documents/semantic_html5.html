<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semantic HTML5</title>
</head>
<body>
  <header>
    <h1>Site Title</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#blog">Blog</a>
    </nav>
  </header>

  <main>
    <article>
      <header>
        <h2>Article Title</h2>
        <time datetime="2025-01-15">January 15, 2025</time>
      </header>

      <p>Article content goes here.</p>

      <aside>
        <p>Related information</p>
      </aside>
    </article>
  </main>

  <footer>
    <p>Contact: info@example.com</p>
  </footer>
</body>
</html>
