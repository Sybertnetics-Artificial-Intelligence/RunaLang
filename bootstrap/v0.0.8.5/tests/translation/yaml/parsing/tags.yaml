# YAML Tags Test Suite
test_suite: YAML Tags
description: Test explicit type tags

# Basic type tags
tagged_types:
  explicit_string: !!str 123
  explicit_integer: !!int "456"
  explicit_float: !!float "3.14"
  explicit_boolean: !!bool "yes"
  explicit_null: !!null ""

# Binary data
binary_data: !!binary |
  R0lGODlhDAAMAIQAAP//9/X
  17unp5WZmZgAAAOfn515eXv
  Pz7Y6OjuDg4J+fn5OTk6en
  p56enmlpaWNjY6Ojo4SEhP
  /++f/++f/++f/++f/++f/+
  +f/++f/++f/++SH+Dk1hZG
  UgYnkgQWNvcm4=

# Ordered mapping (preserves key order)
ordered_map: !!omap
  - first: 1
  - second: 2
  - third: 3

# Set (unique values only)
unique_values: !!set
  ? apple
  ? banana
  ? cherry

# Custom application tags
custom_tags:
  date: !date 2025-11-01
  color: !color
    red: 255
    green: 128
    blue: 0

# Tagged sequences
tagged_sequence: !!seq
  - item1
  - item2
  - item3

# Tagged mapping
tagged_mapping: !!map
  key1: value1
  key2: value2
