# YAML Basic Types Test Suite
test_suite: Basic YAML Types
description: Test parsing of all YAML primitive types

tests:
  # String tests
  string_simple: hello world
  string_empty: ""
  string_single_quoted: 'single quoted string'
  string_double_quoted: "double quoted string"
  string_with_newline: |
    Line 1
    Line 2
    Line 3
  string_folded: >
    This is a long
    string that will
    be folded into
    a single line.
  string_with_escapes: "Quote: \" Backslash: \\ Newline: \n Tab: \t"

  # Number tests
  integer_zero: 0
  integer_positive: 42
  integer_negative: -17
  integer_large: 2147483647
  integer_hex: 0x2A
  integer_octal: 0o52

  float_simple: 3.14
  float_negative: -2.718
  float_zero: 0.0
  float_scientific: 6.022e23
  float_scientific_negative: 1.234e-10
  float_infinity: .inf
  float_negative_infinity: -.inf
  float_nan: .nan

  # Boolean tests
  boolean_true: true
  boolean_false: false
  boolean_yes: yes
  boolean_no: no
  boolean_on: on
  boolean_off: off

  # Null tests
  null_value: null
  null_tilde: ~
  null_implicit:

  # Special YAML values
  timestamp: 2025-11-01T12:00:00Z
  date: 2025-11-01
