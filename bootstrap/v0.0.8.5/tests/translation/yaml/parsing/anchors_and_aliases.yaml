# YAML Anchors and Aliases Test Suite
test_suite: Anchors and Aliases
description: Test anchor definition and alias reference functionality

# Basic anchor and alias
basic_anchor_alias:
  default_settings: &defaults
    timeout: 30
    retries: 3
    verbose: true

  service_a:
    <<: *defaults
    name: Service A

  service_b:
    <<: *defaults
    name: Service B
    timeout: 60  # Override default

# Sequence with anchored items
sequence_anchors:
  - &first_item
    id: 1
    name: First

  - id: 2
    name: Second
    reference: *first_item

# Multiple anchors
multiple_anchors:
  template_a: &template_a
    type: A
    priority: 1

  template_b: &template_b
    type: B
    priority: 2

  item1: *template_a
  item2: *template_b
  item3:
    <<: *template_a
    name: Custom A

# Anchored scalar
anchored_scalar:
  version: &version 1.0.0
  app_version: *version
  api_version: *version

# Complex anchor structure
complex_anchor:
  database: &db_config
    host: localhost
    port: 5432
    credentials:
      username: admin
      password: secret
    connection_pool:
      min: 5
      max: 20

  primary_db: *db_config
  replica_db:
    <<: *db_config
    host: replica.example.com
    port: 5433

# Anchored list
anchored_list:
  common_tags: &common_tags
    - production
    - monitored
    - critical

  service_tags: *common_tags
  database_tags:
    - *common_tags
    - database
    - postgresql
