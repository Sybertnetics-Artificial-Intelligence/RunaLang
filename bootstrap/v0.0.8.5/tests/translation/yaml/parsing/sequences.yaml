# YAML Sequences Test Suite
test_suite: YAML Sequences
description: Test parsing of various sequence structures

# Block sequence - integers
integer_sequence:
  - 1
  - 2
  - 3
  - 4
  - 5

# Block sequence - strings
string_sequence:
  - apple
  - banana
  - cherry
  - date
  - elderberry

# Block sequence - mixed types
mixed_sequence:
  - 1
  - two
  - 3.0
  - true
  - false
  - null

# Flow sequence - compact style
flow_sequence_integers: [1, 2, 3, 4, 5]
flow_sequence_strings: [apple, banana, cherry]
flow_sequence_mixed: [1, "two", 3.0, true, null]

# Nested sequences
nested_sequences:
  - [1, 2, 3]
  - [4, 5, 6]
  - [7, 8, 9]

# Deeply nested sequences
deeply_nested:
  - - [1, 2]
    - [3, 4]
  - - [5, 6]
    - [7, 8]

# Sequence of mappings
sequence_of_mappings:
  - id: 1
    name: Alice
  - id: 2
    name: Bob
  - id: 3
    name: Charlie

# Mapping with sequences
mapping_with_sequences:
  alice:
    scores: [95, 87, 92]
    tags: [student, honor, dean]
  bob:
    scores: [88, 90, 85]
    tags: [student, athlete]

# Complex nested structure
complex_nested:
  - id: 1
    tags: [important, urgent]
    metadata:
      created: 2025-01-01
      modified: 2025-01-15
    items:
      - name: Item A
        values: [1, 2, 3]
      - name: Item B
        values: [4, 5, 6]

# Empty sequences
empty_block_sequence: []
empty_in_mapping:
  key1: []
  key2:
    nested_empty: []
