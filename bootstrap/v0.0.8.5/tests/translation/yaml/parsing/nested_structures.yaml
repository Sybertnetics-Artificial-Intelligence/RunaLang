# YAML Nested Structures Test Suite
test_suite: Nested YAML Structures
description: Test parsing of nested mappings and sequences

# Simple nested mapping
simple_nesting:
  outer:
    inner:
      value: deeply nested

# Multiple levels
multiple_levels:
  level1:
    level2:
      level3:
        level4:
          level5:
            value: 5 levels deep

# Mixed types nested
mixed_types_nested:
  user:
    name: Alice
    age: 30
    active: true
    address:
      street: 123 Main St
      city: Metropolis
      zipcode: 12345
      coordinates:
        latitude: 40.7128
        longitude: -74.0060
    preferences:
      notifications: true
      theme: dark
      language: en-US

# Empty nested structures
empty_objects_nested:
  outer: {}
  middle:
    inner: {}
  deep:
    deeper:
      deepest: {}

# Complex hierarchy
complex_hierarchy:
  company:
    name: Tech Corp
    founded: 2010
    departments:
      engineering:
        manager: Bob Smith
        team_size: 50
        budget: 5000000
        projects:
          project_a:
            status: active
            priority: 1
          project_b:
            status: planning
            priority: 2
      sales:
        manager: Jane Doe
        team_size: 25
        budget: 2000000
        regions:
          north_america:
            revenue: 10000000
          europe:
            revenue: 7500000
