# YAML Edge Cases Test Suite
test_suite: Edge Cases
description: Test edge cases and special scenarios

# Keys with special characters
special_keys:
  key-with-dashes: value1
  key_with_underscores: value2
  key.with.dots: value3
  "key:with:colons": value4
  "key with spaces": value5

# Unicode and international characters
unicode_tests:
  japanese: 日本語
  chinese: 中文
  korean: 한국어
  russian: Русский
  arabic: العربية
  emoji: 😀🚀💻

# Long strings
long_strings:
  paragraph: |
    Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
    Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.

  folded_long: >
    This is a very long string that
    will be folded into a single line
    with spaces replacing the newlines
    except for blank lines.

# Whitespace variations
whitespace:
  leading_space: "  value"
  trailing_space: "value  "
  multiple_spaces: "value    with    spaces"

# Empty values
empty_values:
  empty_string: ""
  null_value: null
  tilde_null: ~
  implicit_null:
  explicit_null: !!null

# Complex key-value patterns
complex_patterns:
  ? - key
    - as
    - sequence
  : value for complex key

  ? {key: as, mapping: true}
  : value for mapping key

# Quoted variations
quotes:
  single_quotes: 'single quoted'
  double_quotes: "double quoted"
  escaped_single: 'can''t'
  escaped_double: "quote: \" backslash: \\"

# Flow style variations
flow_style:
  inline_mapping: {a: 1, b: 2, c: 3}
  inline_sequence: [1, 2, 3, 4, 5]
  nested_flow: {outer: {inner: [1, 2, 3]}}
  mixed_flow_block:
    {
      key1: value1,
      key2: [item1, item2],
      key3: {nested: true}
    }

# Indentation variations
indentation:
  two_space:
    nested:
      deep: value

  mixed_content:
    - item1
    - item2:
        nested: value

# Comments in various positions
comments:
  before_key: value  # inline comment
  # comment before value
  after_comment: value
  multiline:  # start comment
    - item1  # comment on item
    - item2
    # comment in sequence
    - item3

# Trailing content
trailing:
  value1: data
  value2: more_data
  # This is the end
